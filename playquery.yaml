# yaml-language-server: $schema=./playquery.schema.json

# -─────────────────────────────────────────────
#  AI Provider
# ──────────────────────────────────────────────

ai:
  # Identifies the AI provider implementation to use.
  # Changing this value switches the entire provider.
  type: copilot

  # Model name or identifier to use with the selected provider.
  model: claude-haiku-4.5

  # Request timeout in seconds. Defaults to 300.0.
  timeout: 300.0

  # Optional GitHub token for providers that support it (e.g. Copilot).
  github_token: null

# ─────────────────────────────────────────────
#  Search Engine
# ─────────────────────────────────────────────
search_engine:
  # Identifies the search engine implementation to use.
  # Changing this value switches the entire engine.
  type: searxng

  # Base URL of your self-hosted SearXNG instance.
  base_url: http://localhost:8080

  # Optional: custom User-Agent sent with every request.
  user_agent: "PlayQuery/1.0"

  # Request timeout in seconds. Defaults to 30.0.
  timeout: 30.0

# ─────────────────────────────────────────────
#  Scraper
# ─────────────────────────────────────────────
scraper:
  # Identifies the scraper implementation to use.
  type: patchright

  # Run the browser in headless mode.
  headless: true

  # Browser channel (e.g. 'chrome', 'msedge'). Omit to use bundled Chromium.
  # channel: chrome

  # Browser locale sent with every request.
  locale: "en-US"

  # Default page-load timeout in seconds.
  timeout: 30.0
