name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  ci:
    name: Run CI workflow
    uses: ./.github/workflows/ci.yml

  cd:
    name: Run CD workflow
    needs: ci
    uses: ./.github/workflows/cd.yml
    secrets: inherit
