name: Reusable CD

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  check-tag:
    name: Check version tag
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
      release_exists: ${{ steps.check.outputs.release_exists }}
      version: ${{ steps.project.outputs.version }}
      version_tag: ${{ steps.check.outputs.version_tag }}
      image: ${{ steps.project.outputs.image }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Read project metadata
        id: project
        shell: bash
        run: |
          python - <<'PY'
          import os
          import pathlib
          import tomllib

          data = tomllib.loads(pathlib.Path("pyproject.toml").read_text())
          project = data.get("project", {})
          version = project.get("version")
          name = project.get("name")
          if not version or not name:
              raise SystemExit("pyproject.toml must define [project].name and [project].version")

          image = f"ghcr.io/{os.environ['GITHUB_REPOSITORY'].lower()}"
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"version={version}\n")
              fh.write(f"name={name}\n")
              fh.write(f"image={image}\n")
          PY

      - name: Check if release already exists
        id: check
        shell: bash
        env:
          VERSION: ${{ steps.project.outputs.version }}
        run: |
          set -euo pipefail

          version_tag="v${VERSION}"
          echo "version_tag=${version_tag}" >> "$GITHUB_OUTPUT"

          if git rev-parse -q --verify "refs/tags/${version_tag}" >/dev/null; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  publish-image:
    name: Publish image
    needs: check-tag
    if: needs.check-tag.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.check-tag.outputs.image }}
          tags: |
            type=raw,value=${{ needs.check-tag.outputs.version_tag }}
            type=raw,value=latest
            type=sha,format=long,prefix=sha-

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64/v8
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  prepare-release:
    name: Prepare release
    needs: [check-tag, publish-image]
    if: needs.check-tag.outputs.skip != 'true' && needs.check-tag.outputs.release_exists != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Prepare tags and release notes
        shell: bash
        env:
          VERSION_TAG: ${{ needs.check-tag.outputs.version_tag }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          previous_tag="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"

          git tag "${VERSION_TAG}" "$GITHUB_SHA"
          git tag -f latest "$GITHUB_SHA"
          git push origin "refs/tags/${VERSION_TAG}"
          git push origin "refs/tags/latest" --force

          VERSION_TAG="$VERSION_TAG" PREVIOUS_TAG="$previous_tag" python - <<'PY'
          import os
          import re
          import subprocess
          from collections import OrderedDict
          from pathlib import Path

          version_tag = os.environ["VERSION_TAG"]
          previous_tag = os.environ.get("PREVIOUS_TAG", "")
          repo = os.environ["GITHUB_REPOSITORY"]
          sha = os.environ["GITHUB_SHA"]

          if previous_tag:
              rev_range = f"{previous_tag}..{sha}"
              intro = f"Changes since {previous_tag}."
          else:
              rev_range = sha
              intro = "Initial release covering the full commit history."

          result = subprocess.run(
              ["git", "log", "--reverse", "--pretty=format:%H%x09%s", rev_range],
              check=True,
              capture_output=True,
              text=True,
          )
          lines = [line for line in result.stdout.splitlines() if line.strip()]

          categories = OrderedDict(
              [
                  ("feat", "Features"),
                  ("fix", "Fixes"),
                  ("perf", "Performance"),
                  ("refactor", "Refactors"),
                  ("docs", "Documentation"),
                  ("test", "Tests"),
                  ("build", "Build"),
                  ("ci", "CI"),
                  ("chore", "Chores"),
                  ("style", "Style"),
                  ("revert", "Reverts"),
              ]
          )
          grouped = {title: [] for title in categories.values()}
          grouped["Other"] = []

          pattern = re.compile(r"^(?P<type>[a-zA-Z]+)(\([^)]+\))?(!)?:\s*(?P<subject>.+)$")
          for line in lines:
              commit_sha, subject = line.split("\t", 1)
              match = pattern.match(subject)
              if match:
                  commit_type = match.group("type").lower()
                  bucket = categories.get(commit_type, "Other")
                  message = match.group("subject")
              else:
                  bucket = "Other"
                  message = subject
              grouped[bucket].append(f"- {message} ({commit_sha[:7]})")

          body = [f"# {version_tag}", "", intro]
          for title, entries in grouped.items():
              if not entries:
                  continue
              body.extend(["", f"## {title}", *entries])

          body.extend([
              "",
              f"Container image: ghcr.io/{repo.lower()}:{version_tag}",
              f"Container image: ghcr.io/{repo.lower()}:latest",
          ])
          Path("release-notes.md").write_text("\n".join(body) + "\n", encoding="utf-8")
          PY

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION_TAG: ${{ needs.check-tag.outputs.version_tag }}
        run: gh release create "$VERSION_TAG" --target "$GITHUB_SHA" --title "$VERSION_TAG" --notes-file release-notes.md
