services:
  playquery:
    build:
      context: .
    container_name: playquery
    depends_on:
      - searxng
    ports:
      - "8000:8000"
    environment:
      - "PLAYQUERY_LOGGING_LEVEL=DEBUG"
      - "PLAYQUERY_AI_TYPE=copilot"
      - "PLAYQUERY_AI_MODEL=claude-haiku-4.5"
      - "PLAYQUERY_AI_TIMEOUT=300"
      - "PLAYQUERY_AI_GITHUB_TOKEN=${PLAYQUERY_AI_GITHUB_TOKEN:-}"
      - "PLAYQUERY_SEARCH_ENGINE_TYPE=searxng"
      - "PLAYQUERY_SEARCH_ENGINE_BASE_URL=http://searxng:8080"
      - "PLAYQUERY_SEARCH_ENGINE_USER_AGENT=PlayQuery/1.0"
      - "PLAYQUERY_SEARCH_ENGINE_TIMEOUT=30"
      - "PLAYQUERY_SCRAPER_TYPE=patchright"
      - "PLAYQUERY_SCRAPER_HEADLESS=true"
      - "PLAYQUERY_SCRAPER_LOCALE=en-US"
      - "PLAYQUERY_SCRAPER_TIMEOUT=30"
      - "PLAYQUERY_MCP_TRANSPORT=streamable-http"
      - "PLAYQUERY_MCP_HOST=0.0.0.0"
      - "PLAYQUERY_MCP_PORT=8000"
      - "PLAYQUERY_MCP_PATH=/mcp"
      - "PLAYQUERY_MCP_JSON_RESPONSE=true"
      - "PLAYQUERY_MCP_STATELESS_HTTP=true"
      - "PLAYQUERY_MCP_CORS_ORIGINS=*"

  searxng:
    image: searxng/searxng:2026.5.10-df1f24fb7
    container_name: pq-searxng
    environment:
      - "SEARXNG_BASE_URL=http://searxng:8080"
    restart: unless-stopped
